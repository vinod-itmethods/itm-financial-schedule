version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: itm-financial-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      # Persistent schedule data — survives redeploys
      - schedules_data:/app/data/schedules
    networks:
      - web
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: itm-financial-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - web

  certbot:
    image: certbot/certbot
    container_name: itm-financial-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Run manually: docker compose -f docker-compose.prod.yml run --rm certbot certonly ...
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"

volumes:
  schedules_data:
    driver: local
  certbot_www:
  certbot_certs:

networks:
  web:
    driver: bridge
