name: Build & Deploy — Forge Financial Schedule

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  id-token: write   # required for OIDC → AWS
  contents: read

jobs:
  deploy:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "export HOME=/root",
              "git config --global --add safe.directory /app/itm-financial-schedule",
              "cd /app/itm-financial-schedule",
              "git fetch origin main",
              "git reset --hard origin/main",
              "docker compose -f docker-compose.prod.yml up -d --build",
              "docker image prune -f",
              "echo DEPLOYED"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for completion (up to 5 min)
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          # Print output
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}" \
            --output json
