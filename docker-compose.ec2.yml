services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forge-financial
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
    volumes:
      # Persistent schedule data — survives redeploys
      - schedules_data:/app/data/schedules

volumes:
  schedules_data:
    driver: local
